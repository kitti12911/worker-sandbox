stages:
    - lint
    - test
    - security
    - plan
    - build
    - release
    - publish

workflow:
    rules:
        - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
        - if: '$CI_COMMIT_BRANCH == "develop" || $CI_COMMIT_BRANCH == "uat" || $CI_COMMIT_BRANCH == "main"'
        - when: never

variables:
    GIT_DEPTH: "0"
    GITLAB_AMD64_RUNNER_TAG: "solution-principle.gitlab-bu8-sd"
    GO_TEST_RACE: "false"
    DOCKER_HOST: "tcp://docker:2375"
    DOCKER_TLS_CERTDIR: ""
    DOCKER_DRIVER: "overlay2"
    IMAGE_NAME: "worker-sandbox"

.docker_job:
    image: $CI_DOCKER_CLI_IMAGE
    services:
        - name: $CI_DOCKER_DIND_IMAGE
          alias: docker
    before_script:
        - |
            for attempt in 1 2 3 4 5; do
                if docker info >/dev/null 2>&1; then
                    break
                fi
                if [ "${attempt}" -eq 5 ]; then
                    docker info
                fi
                sleep 2
            done
        - docker buildx version

markdownlint:
    stage: lint
    image: $CI_RELEASE_TOOLCHAIN_IMAGE
    tags:
        - $GITLAB_AMD64_RUNNER_TAG
    rules:
        - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
          changes: &markdown_changes
              - ".gitlab-ci.yml"
              - ".markdownlint-cli2.*"
              - ".markdownlint.*"
              - "scripts/ci/markdownlint.sh"
              - "**/*.md"
              - "**/*.markdown"
        - if: '$CI_COMMIT_BRANCH == "develop" || $CI_COMMIT_BRANCH == "uat" || $CI_COMMIT_BRANCH == "main"'
          changes: *markdown_changes
    script:
        - ./scripts/ci/markdownlint.sh

lint:go:
    stage: lint
    image: $CI_IMAGE_TOOLCHAIN_IMAGE
    tags:
        - $GITLAB_AMD64_RUNNER_TAG
    rules:
        - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
          changes: &go_changes
              - ".gitlab-ci.yml"
              - "release.config.cjs"
              - ".github/workflows/go-ci.yml"
              - ".github/workflows/release.yml"
              - ".golangci.yml"
              - "Dockerfile"
              - "Makefile"
              - "config.example.yml"
              - "go.mod"
              - "go.sum"
              - "scripts/ci/**"
              - "**/*.go"
              - "**/*.sql"
              - "**/*.yml"
              - "**/*.yaml"
        - if: '$CI_COMMIT_BRANCH == "develop" || $CI_COMMIT_BRANCH == "uat" || $CI_COMMIT_BRANCH == "main"'
          changes: *go_changes
    script:
        - ./scripts/ci/go-lint.sh

test:go:
    stage: test
    image: $CI_IMAGE_TOOLCHAIN_IMAGE
    tags:
        - $GITLAB_AMD64_RUNNER_TAG
    rules:
        - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
          changes: *go_changes
        - if: '$CI_COMMIT_BRANCH == "develop" || $CI_COMMIT_BRANCH == "uat" || $CI_COMMIT_BRANCH == "main"'
          changes: *go_changes
    script:
        - ./scripts/ci/go-test.sh
    artifacts:
        when: always
        expire_in: 1 week
        paths:
            - coverage.out

security:toolchain:
    stage: security
    image: $CI_SECURITY_TOOLCHAIN_IMAGE
    tags:
        - $GITLAB_AMD64_RUNNER_TAG
    rules:
        - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
          changes: *go_changes
        - if: '$CI_COMMIT_BRANCH == "develop" || $CI_COMMIT_BRANCH == "uat" || $CI_COMMIT_BRANCH == "main"'
          changes: *go_changes
    script:
        - ./scripts/ci/security-scan.sh

security:supply-chain:
    stage: security
    image: $CI_SUPPLY_CHAIN_TOOLCHAIN_IMAGE
    tags:
        - $GITLAB_AMD64_RUNNER_TAG
    rules:
        - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
          changes: *go_changes
        - if: '$CI_COMMIT_BRANCH == "develop" || $CI_COMMIT_BRANCH == "uat" || $CI_COMMIT_BRANCH == "main"'
          changes: *go_changes
    script:
        - ./scripts/ci/supply-chain-scan.sh

release:plan:
    stage: plan
    image: $CI_RELEASE_TOOLCHAIN_IMAGE
    tags:
        - $GITLAB_AMD64_RUNNER_TAG
    needs:
        - job: lint:go
        - job: test:go
        - job: security:toolchain
        - job: security:supply-chain
    rules:
        - if: '$CI_COMMIT_BRANCH == "develop" || $CI_COMMIT_BRANCH == "uat" || $CI_COMMIT_BRANCH == "main"'
          changes: *go_changes
    script:
        - git fetch --tags --force
        - |
            token="${GL_TOKEN:-${GITLAB_TOKEN:-}}"
            if [ -z "${token}" ]; then
                echo "GL_TOKEN or GITLAB_TOKEN is required for GitLab semantic-release." >&2
                exit 2
            fi
            git remote set-url origin "https://oauth2:${token}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
        - RELEASE_BRANCH="${CI_COMMIT_BRANCH}" CI_OUTPUT_FILE=".semantic-release.outputs" ./scripts/ci/semantic-release-plan.sh --no-ci
        - sed -n 's/^release_created=/RELEASE_CREATED=/p; s/^tag_name=/RELEASE_TAG=/p' .semantic-release.outputs > release.env
        - cat release.env
    artifacts:
        reports:
            dotenv: release.env

build:amd64:
    extends: .docker_job
    stage: build
    tags:
        - $GITLAB_AMD64_RUNNER_TAG
    needs:
        - job: release:plan
          artifacts: true
    rules:
        - if: '$CI_COMMIT_BRANCH == "develop" || $CI_COMMIT_BRANCH == "uat" || $CI_COMMIT_BRANCH == "main"'
          changes: *go_changes
    script:
        - |
            if [ "${RELEASE_CREATED:-false}" != "true" ]; then
                echo "No semantic release planned; skipping image build."
                exit 0
            fi
        - export REGISTRY="${IMAGE_REGISTRY:?IMAGE_REGISTRY is required}"
        - export IMAGE_NAMESPACE="${IMAGE_NAMESPACE:?IMAGE_NAMESPACE is required}"
        - export IMAGE_REF="${REGISTRY}/${IMAGE_NAMESPACE}/${IMAGE_NAME}"
        - export STAGING_IMAGE_REF="${IMAGE_REF}:staging-${CI_COMMIT_SHA}-amd64"
        - export TOOLCHAIN_IMAGE="${CI_IMAGE_TOOLCHAIN_IMAGE:?CI_IMAGE_TOOLCHAIN_IMAGE is required}"
        - ./scripts/ci/require-env.sh REGISTRY IMAGE_NAMESPACE IMAGE_REF STAGING_IMAGE_REF TOOLCHAIN_IMAGE
        - ./scripts/ci/setup-buildx.sh
        - REGISTRY_USERNAME="${IMAGE_REGISTRY_USERNAME}" REGISTRY_PASSWORD="${IMAGE_REGISTRY_PASSWORD}" ./scripts/ci/login-registry.sh
        - >
            IMAGE_CONTEXT="."
            IMAGE_PLATFORM="linux/amd64"
            IMAGE_TAG="${STAGING_IMAGE_REF}"
            BUILD_OUTPUT="type=image,push=true,oci-mediatypes=true"
            BUILD_PROVENANCE="true"
            BUILD_SBOM="true"
            ./scripts/ci/build-image.sh
        - |
            if [ -n "${CI_TRIVY_RUNNER_IMAGE:-}" ]; then
                export TRIVY_RUNNER_IMAGE="${CI_TRIVY_RUNNER_IMAGE}"
            fi
        - >
            TRIVY_IMAGE_REF="${STAGING_IMAGE_REF}"
            TRIVY_REPORT="${CI_PROJECT_DIR}/trivy-results.json"
            TRIVY_QUIET="true"
            TRIVY_IMAGE_SRC="remote"
            TRIVY_PLATFORM="linux/amd64"
            TRIVY_USERNAME="${IMAGE_REGISTRY_USERNAME}"
            TRIVY_PASSWORD="${IMAGE_REGISTRY_PASSWORD}"
            ./scripts/ci/scan-image.sh

release:publish:
    stage: release
    image: $CI_RELEASE_TOOLCHAIN_IMAGE
    tags:
        - $GITLAB_AMD64_RUNNER_TAG
    needs:
        - job: release:plan
          artifacts: true
        - job: build:amd64
    rules:
        - if: '$CI_COMMIT_BRANCH == "develop" || $CI_COMMIT_BRANCH == "uat" || $CI_COMMIT_BRANCH == "main"'
          changes: *go_changes
    script:
        - |
            if [ "${RELEASE_CREATED:-false}" != "true" ]; then
                echo "No semantic release planned; skipping release publish."
                printf 'PUBLISHED=false\n' > publish.env
                exit 0
            fi
        - git fetch --tags --force
        - |
            token="${GL_TOKEN:-${GITLAB_TOKEN:-}}"
            if [ -z "${token}" ]; then
                echo "GL_TOKEN or GITLAB_TOKEN is required for GitLab semantic-release." >&2
                exit 2
            fi
            git remote set-url origin "https://oauth2:${token}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
        - RELEASE_BRANCH="${CI_COMMIT_BRANCH}" CI_OUTPUT_FILE=".semantic-release.outputs" ./scripts/ci/semantic-release-publish.sh --no-ci
        - |
            awk -F= '
                $1 == "published" { published = $2 }
                $1 == "version" { version = $2 }
                $1 == "git_tag" { git_tag = $2 }
                $1 == "env_tag" { env_tag = $2 }
                END {
                    if (published != "") print "PUBLISHED=" published
                    if (version != "") print "RELEASE_VERSION=" version
                    if (git_tag != "") print "RELEASE_TAG=" git_tag
                    if (env_tag != "") print "ENV_TAG=" env_tag
                }
            ' .semantic-release.outputs > publish.env
        - cat publish.env
    artifacts:
        reports:
            dotenv: publish.env

publish:amd64:
    extends: .docker_job
    stage: publish
    tags:
        - $GITLAB_AMD64_RUNNER_TAG
    needs:
        - job: release:publish
          artifacts: true
        - job: build:amd64
    rules:
        - if: '$CI_COMMIT_BRANCH == "develop" || $CI_COMMIT_BRANCH == "uat" || $CI_COMMIT_BRANCH == "main"'
          changes: *go_changes
    script:
        - |
            if [ "${PUBLISHED:-false}" != "true" ]; then
                echo "No semantic release published; skipping image publish."
                exit 0
            fi
        - apk add --no-cache cosign
        - export REGISTRY="${IMAGE_REGISTRY:?IMAGE_REGISTRY is required}"
        - export IMAGE_NAMESPACE="${IMAGE_NAMESPACE:?IMAGE_NAMESPACE is required}"
        - export IMAGE_REF="${REGISTRY}/${IMAGE_NAMESPACE}/${IMAGE_NAME}"
        - export IMAGE_ARCHES="amd64"
        - export STAGING_IMAGE_REF="${IMAGE_REF}:staging-${CI_COMMIT_SHA}-amd64"
        - export ARCH_IMAGE_REF="${IMAGE_REF}:${RELEASE_TAG}-amd64"
        - export SHA_ARCH_IMAGE_REF="${IMAGE_REF}:${CI_COMMIT_SHA}-amd64"
        - ./scripts/ci/require-env.sh REGISTRY IMAGE_NAMESPACE IMAGE_REF RELEASE_TAG STAGING_IMAGE_REF ARCH_IMAGE_REF
        - ./scripts/ci/setup-buildx.sh
        - REGISTRY_USERNAME="${IMAGE_REGISTRY_USERNAME}" REGISTRY_PASSWORD="${IMAGE_REGISTRY_PASSWORD}" ./scripts/ci/login-registry.sh
        - ./scripts/ci/promote-image.sh
        - RELEASE_SHA="${CI_COMMIT_SHA}" RELEASE_BRANCH="${CI_COMMIT_BRANCH}" ./scripts/ci/publish-manifest.sh
        - CI_OUTPUT_FILE=".image.outputs" ./scripts/ci/resolve-image-digests.sh
        - ./scripts/ci/sign-image.sh
